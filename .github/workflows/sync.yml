name: Daily AI Sync Cron

on:
  schedule:
    # Runs at 05:00 AM UTC everyday (approx 7:00 AM local Israel time)
    - cron: '0 5 * * *'
  workflow_dispatch: {} # Allows manual run inside GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run AI Sync
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          NEXT_PUBLIC_BASE_URL: https://${{ secrets.DEPLOYED_APP_URL }}
        run: node scripts/sync_cron.js
